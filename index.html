<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#04742C"/>
  <title>CSF Operativa — Prefectura Arica Nro. 1</title>
  <link rel="stylesheet" href="css/csf.css"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>

<!-- ══ LOGIN ══════════════════════════════════════════════ -->
<div id="pantalla-login">
  <div class="login-wrap">
    <div class="login-brand">
      <div class="login-brand-icon">🏔</div>
      <div class="login-brand-name">CSF OPERATIVA</div>
      <div class="login-brand-sub">Prefectura Arica Nro. 1 · Carabineros de Chile</div>
    </div>
    <div class="login-card">
      <div class="login-card-title">Iniciar sesión</div>
      <div class="login-campo">
        <label>Correo electrónico</label>
        <input id="login-email" type="email" placeholder="usuario@carabineros.cl" autocomplete="email"/>
      </div>
      <div class="login-campo">
        <label>Contraseña</label>
        <input id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <div id="login-error" class="login-error"></div>
      <button id="login-btn" class="btn btn-primario btn-full" onclick="hacerLogin()">
        Ingresar
      </button>
      <div class="login-aviso">Acceso restringido al personal autorizado</div>
    </div>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════════════ -->
<div id="app-shell" style="display:none">

  <!-- TOPBAR — posición fija, nunca se mueve -->
  <header id="topbar">
    <div class="topbar-left">
      <button id="mob-menu-btn" onclick="toggleSidebar()">☰</button>
      <div class="topbar-brand">
        <span class="topbar-logo">CSF OPERATIVA</span>
        <span class="topbar-sep">·</span>
        <span id="topbar-cuartel" class="topbar-cuartel"></span>
      </div>
    </div>
    <div class="topbar-right">
      <span id="topbar-rol" class="topbar-rol-badge"></span>
      <button id="topbar-user-btn" onclick="mostrarMenuUsuario()">
        <span id="topbar-user-label">Mi cuenta</span>
        <span class="topbar-chevron">▾</span>
      </button>
    </div>
  </header>

  <!-- SIDEBAR — posición fija izquierda, debajo del topbar -->
  <nav id="sidebar">
    <div id="nav-items"></div>
    <div class="sidebar-footer">
      <div id="sidebar-rol" class="sidebar-rol-txt"></div>
      <button class="btn-cerrar-sesion" onclick="cerrarSesion()">
        <span>⎋</span> Cerrar sesión
      </button>
    </div>
  </nav>

  <!-- OVERLAY para cerrar sidebar en móvil -->
  <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <!-- MAIN — scrolleable, ocupa el resto -->
  <main id="main-content">
    <div id="pantalla-dashboard" class="pantalla"></div>
    <div id="pantalla-servicios" class="pantalla"></div>
    <div id="pantalla-csf"       class="pantalla"></div>
    <div id="pantalla-reportes"  class="pantalla"></div>
    <div id="pantalla-admin"     class="pantalla"></div>
  </main>

</div>
<!-- mob-nav FUERA del app-shell — nunca entra al layout -->
<nav id="mob-nav"></nav>

<!-- ══ SCRIPTS ════════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="js/config.js"></script>
<script src="js/core.js"></script>
<script src="js/pages/login.js"></script>
<script src="js/pages/dashboard.js"></script>
<script src="js/pages/servicios.js"></script>
<script src="js/pages/csf.js"></script>
<script src="js/pages/reportes.js"></script>
<script src="js/pages/admin.js"></script>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  await iniciarApp()
  APP.sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_OUT') mostrarLogin()
    if (event === 'SIGNED_IN' && session) cargarPerfil(session.user.id)
  })
})

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('sidebar-open')
  document.getElementById('sidebar-overlay').classList.toggle('visible')
}

function mostrarMenuUsuario() {
  if (confirm('¿Cerrar sesión?')) cerrarSesion()
}

const _origMostrarApp = mostrarApp
window.mostrarApp = function() {
  _origMostrarApp()
  const cuartel = APP.cuartel?.nombre || ''
  const user    = APP.perfil?.email?.split('@')[0] || 'Mi cuenta'
  const rol     = (APP.perfil?.rol || '').toUpperCase()

  const tc = document.getElementById('topbar-cuartel')
  const tul= document.getElementById('topbar-user-label')
  const tr = document.getElementById('topbar-rol')
  const sr = document.getElementById('sidebar-rol')

  if (tc)  tc.textContent  = cuartel
  if (tul) tul.textContent = user
  if (tr)  tr.textContent  = rol
  if (sr)  sr.textContent  = 'Rol: ' + rol
}
</script>
</body>
</html>
