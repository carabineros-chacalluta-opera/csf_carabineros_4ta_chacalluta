<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#04742C"/>
  <title>CSF Operativa — Prefectura Arica Nro. 1</title>
  <link rel="stylesheet" href="css/csf.css"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     PANTALLA LOGIN
═══════════════════════════════════════════════════════════ -->
<div id="pantalla-login" style="display:flex">
  <div class="login-box">
    <div class="login-escudo">🏔</div>
    <div class="login-titulo">CSF OPERATIVA</div>
    <div class="login-sub">
      Carta de Situación Fronteriza<br/>
      Prefectura Arica Nro. 1 · Carabineros de Chile
    </div>
    <div class="login-campo">
      <label>Correo electrónico</label>
      <input id="login-email" type="email" placeholder="usuario@carabineros.cl" autocomplete="email"/>
    </div>
    <div class="login-campo">
      <label>Contraseña</label>
      <input id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <div id="login-error" class="login-error"></div>
    <button id="login-btn" class="btn btn-primario" style="width:100%" onclick="hacerLogin()">
      Ingresar al sistema
    </button>
    <div style="font-size:.65rem;color:var(--muted);margin-top:1.25rem">
      Sistema de uso interno. Acceso restringido al personal autorizado.
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════
     APP SHELL
═══════════════════════════════════════════════════════════ -->
<div id="app-shell" style="display:none">

  <!-- TOPBAR -->
  <header id="topbar">
    <div>
      <div id="topbar-logo">CSF OPERATIVA</div>
      <div id="topbar-sub">Prefectura Arica Nro. 1</div>
    </div>
    <div id="topbar-cuartel"></div>
    <button id="topbar-user-btn" onclick="mostrarMenuUsuario()">
      <span id="topbar-user-label">Mi cuenta ▾</span>
    </button>
  </header>

  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div id="nav-items"></div>
    <div style="margin-top:auto;padding:1rem;border-top:1px solid var(--border)">
      <div id="sidebar-rol" style="font-size:.65rem;color:var(--muted);margin-bottom:.5rem"></div>
      <button class="btn btn-secundario btn-sm" style="width:100%" onclick="cerrarSesion()">
        Cerrar sesión
      </button>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main id="main-content">

    <!-- DASHBOARD -->
    <div id="pantalla-dashboard" class="pantalla"></div>

    <!-- SERVICIOS -->
    <div id="pantalla-servicios" class="pantalla"></div>

    <!-- CSF -->
    <div id="pantalla-csf" class="pantalla"></div>

    <!-- REPORTES -->
    <div id="pantalla-reportes" class="pantalla"></div>

    <!-- ADMIN -->
    <div id="pantalla-admin" class="pantalla"></div>

  </main>

</div>

<!-- ══════════════════════════════════════════════════════════
     SCRIPTS — orden importa
═══════════════════════════════════════════════════════════ -->

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<!-- SheetJS (Excel import) -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<!-- Sistema CSF -->
<script src="js/config.js"></script>
<script src="js/core.js"></script>
<script src="js/pages/login.js"></script>
<script src="js/pages/dashboard.js"></script>
<script src="js/pages/servicios.js"></script>
<script src="js/pages/csf.js"></script>
<script src="js/pages/reportes.js"></script>
<script src="js/pages/admin.js"></script>

<script>
// ── ARRANQUE ───────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  await iniciarApp()
})

// ── MENÚ USUARIO ───────────────────────────────────────────
function mostrarMenuUsuario() {
  if (confirm('¿Cerrar sesión?')) cerrarSesion()
}

// ── AUTH STATE CHANGE ─────────────────────────────────────
// Se dispara si el token expira o el usuario hace signOut desde otra pestaña
if (typeof APP !== 'undefined' && APP.sb) {
  APP.sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_OUT') mostrarLogin()
    if (event === 'SIGNED_IN' && session) cargarPerfil(session.user.id)
  })
}

// ── TOPBAR — actualizar con datos del perfil ──────────────
const _origMostrarApp = mostrarApp
window.mostrarApp = function() {
  _origMostrarApp()
  const tc = document.getElementById('topbar-cuartel')
  const tul = document.getElementById('topbar-user-label')
  const sr  = document.getElementById('sidebar-rol')
  if (tc)  tc.textContent  = APP.cuartel?.nombre || ''
  if (tul) tul.textContent = (APP.perfil?.email?.split('@')[0] || 'Mi cuenta') + ' ▾'
  if (sr)  sr.textContent  = 'Rol: ' + (APP.perfil?.rol || '').toUpperCase()
}
</script>

</body>
</html>
